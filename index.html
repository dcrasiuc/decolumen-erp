<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decolumen ERP - Acceso</title>
    <style>
        /* Estilos generales y colores corporativos */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-container { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        
        /* Área del Logo */
        .logo-area { text-align: center; margin-bottom: 30px; }
        .logo-area h1 { color: #176894; font-size: 28px; letter-spacing: 1px; }
        .logo-area span { color: #F6B221; }
        .logo-area p { color: #666; font-size: 14px; margin-top: 5px; }
        
        /* Formulario */
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; font-size: 14px; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; outline: none; transition: border 0.3s; font-size: 15px; }
        .form-group input:focus { border-color: #176894; box-shadow: 0 0 5px rgba(23, 104, 148, 0.3); }
        
        /* Botón de Ingreso */
        .btn-login { width: 100%; padding: 14px; background-color: #176894; color: white; border: none; border-radius: 5px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s, transform 0.1s; }
        .btn-login:hover { background-color: #125275; }
        .btn-login:active { transform: scale(0.98); }
        
        /* Mensajes de Error */
        .error-message { color: #d9534f; font-size: 14px; text-align: center; margin-top: 15px; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-area">
        <h1>DECO<span>LUMEN</span></h1>
        <p>Sistema de Gestión ERP</p>
    </div>
    
    <form id="loginForm">
        <div class="form-group">
            <label for="email">Correo Electrónico</label>
            <input type="email" id="email" required placeholder="usuario@decolumen.com">
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" required placeholder="********">
        </div>
        <button type="submit" class="btn-login" id="loginBtn">Ingresar al Sistema</button>
        <p id="errorMessage" class="error-message"></p>
    </form>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

    // Credenciales oficiales
    const firebaseConfig = {
      apiKey: "AIzaSyDgU3mV6vygdUpREdXGPXwOC_gSpFBeQOg",
      authDomain: "decolumen-erp.firebaseapp.com",
      projectId: "decolumen-erp",
      storageBucket: "decolumen-erp.firebasestorage.app",
      messagingSenderId: "58125143514",
      appId: "1:58125143514:web:db4ad4706975636289c4e3"
    };

    // Inicializar la conexión
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Capturar los elementos visuales
    const loginForm = document.getElementById('loginForm');
    const loginBtn = document.getElementById('loginBtn');
    const errorMessage = document.getElementById('errorMessage');

    // Lógica al presionar "Ingresar"
    loginForm.addEventListener('submit', (e) => {
        e.preventDefault(); // Evita que la página se recargue
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        
        // Efecto visual de carga
        loginBtn.textContent = "Verificando credenciales...";
        loginBtn.style.backgroundColor = "#F6B221"; // Cambia al color amarillo de la marca
        loginBtn.style.color = "#333";
        errorMessage.style.display = "none";

        // Enviar datos a Firebase
        signInWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                const user = userCredential.user;
                loginBtn.textContent = "Acceso Concedido";
                loginBtn.style.backgroundColor = "#28a745"; // Verde de éxito
                loginBtn.style.color = "white";
                
                setTimeout(() => {
    window.location.href = "dashboard.html";
}, 800);
            })
            .catch((error) => {
                // Si la contraseña está mal o el usuario no existe
                loginBtn.textContent = "Ingresar al Sistema";
                loginBtn.style.backgroundColor = "#176894"; // Vuelve al azul original
                loginBtn.style.color = "white";
                
                // Traducir los errores más comunes
                let mensajeError = "Ocurrió un error. Intenta nuevamente.";
                if(error.code === 'auth/invalid-credential') mensajeError = "Correo o contraseña incorrectos.";
                if(error.code === 'auth/too-many-requests') mensajeError = "Demasiados intentos. Cuenta bloqueada temporalmente.";
                
                errorMessage.textContent = mensajeError;
                errorMessage.style.display = "block";
            });
    });
</script>
</body>
</html>
