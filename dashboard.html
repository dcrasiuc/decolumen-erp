<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decolumen ERP - Panel de Control</title>
    <style>
        /* ESTILOS DECOLUMEN - VERSIÓN COMPLETA */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; overflow: hidden; }
        
        .sidebar { width: 250px; background-color: #176894; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h2 { font-size: 24px; letter-spacing: 1px; }
        .logo-area span { color: #F6B221; }
        
        .nav-menu { flex-grow: 1; padding: 20px 0; }
        .nav-item { padding: 15px 25px; display: block; color: white; text-decoration: none; font-size: 14px; transition: 0.2s; border-left: 4px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255,255,255,0.1); border-left-color: #F6B221; }
        
        .logout-btn { padding: 15px 25px; background-color: #125275; color: white; text-align: center; cursor: pointer; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-header { background-color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-title { color: #333; font-size: 18px; font-weight: bold; }

        .workspace { padding: 30px; }
        .section-title { margin-bottom: 20px; color: #444; font-size: 18px; font-weight: bold; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .action-card { background: white; border-radius: 10px; padding: 25px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eaeaea; }
        .action-card:hover { transform: translateY(-3px); border-color: #F6B221; box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .action-icon { font-size: 35px; margin-bottom: 10px; display: block; }
        .action-card h3 { color: #176894; font-size: 16px; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 95%; max-width: 600px; max-height: 95vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        .btn-submit { width: 100%; padding: 12px; background-color: #F6B221; color: #333; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-scan { width: 100%; padding: 10px; border: 1px dashed #176894; background: #e8f4fd; color: #176894; cursor: pointer; border-radius: 6px; font-weight: bold; margin-bottom: 10px; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; flex-direction: row; }
            .logo-area { padding: 10px; border-bottom: none; }
            .nav-menu { display: flex; overflow-x: auto; padding: 0; }
            .nav-item { padding: 10px 15px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
            .nav-item.active { border-bottom-color: #F6B221; }
            .top-header { display: none; }
            .action-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><h2>DECO<span>LUMEN</span></h2></div>
        <div class="nav-menu">
            <div class="nav-item active">📊 Inicio / Dashboard</div>
            <div class="nav-item">🛒 Ventas y Cobros</div>
            <div class="nav-item">📦 Compras y Gastos</div>
            <div class="nav-item">💸 Movimientos Cajas</div>
            <div class="nav-item">🏦 Bancos y Cheques</div>
            <div class="nav-item">📈 Reportes Z</div>
        </div>
        <div class="logout-btn" onclick="window.location.href='index.html'">Cerrar Sesión</div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="header-title">Resumen Operativo</div>
            <div class="user-info">👤 Administrador</div>
        </div>

        <div class="workspace">
            <div class="section-title">Acciones Rápidas</div>
            <div class="action-grid">
                <div class="action-card" id="btnVenta">
                    <span class="action-icon">💵</span>
                    <h3>Nueva Venta</h3>
                </div>
                <div class="action-card" id="btnTransferencia">
                    <span class="action-icon">🔄</span>
                    <h3>Transferencia</h3>
                </div>
                <div class="action-card" id="btnGasto">
                    <span class="action-icon">🧾</span>
                    <h3>Registrar Gasto</h3>
                </div>
                <div class="action-card" id="btnCierre">
                    <span class="action-icon">🔒</span>
                    <h3>Cierre Caja</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="modalVenta" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🛒 Nueva Venta - Decolumen</h3>
                <span class="close-modal" id="closeVentaModal">&times;</span>
            </div>
            <form id="formVenta">
                <div class="form-row">
                    <div class="form-group">
                        <label>Condición</label>
                        <select id="condicionVenta">
                            <option value="Contado">Contado</option>
                            <option value="Credito">Crédito / Saldo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>N° Factura</label>
                        <input type="text" id="nroComprobante" required placeholder="001-001-0000000">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>RUC Cliente</label>
                        <input type="text" id="clienteRuc" required placeholder="RUC">
                    </div>
                    <div class="form-group">
                        <label>Razón Social</label>
                        <input type="text" id="clienteNombre" required placeholder="Nombre">
                    </div>
                </div>
                <div class="form-group">
                    <label>Total Gs.</label>
                    <input type="text" id="montoVenta" required style="text-align: right; font-weight: bold; font-size: 18px; color: #176894;">
                </div>
                <div id="seccionCobro">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Medio de Pago</label>
                            <select id="medioPago">
                                <option value="Efectivo">Efectivo</option>
                                <option value="Cheque">Cheque</option>
                                <option value="Tarjeta POS">Tarjeta POS</option>
                                <option value="Transferencia">Transferencia</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Depositar en</label>
                            <select id="cajaDestino">
                                <option value="Caja Mostrador">Caja Mostrador</option>
                                <option value="Banco Sudameris">Banco Sudameris</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <button type="button" class="btn-scan" onclick="document.getElementById('fileInput').click()">📷 Escaneo Inteligente (Gemini)</button>
                    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
                    <div id="fileName" style="font-size: 11px; color: #176894; text-align: center; font-weight: bold;"></div>
                </div>
                <button type="submit" class="btn-submit" id="submitVenta">Registrar Operación</button>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            const API_URL = "https://script.google.com/macros/s/AKfycbz7HMGvoWQcsjh9jdFjZKMtGFJwZLik-yq8bazGjtqtQlqZoPR97V_WDraTjatDUQj1/exec";
            
            // 1. Control de Modales
            const modalVenta = document.getElementById('modalVenta');
            document.getElementById('btnVenta').onclick = () => modalVenta.classList.add('active');
            document.getElementById('closeVentaModal').onclick = () => modalVenta.classList.remove('active');

            // 2. Lógica de Condición
            const condicion = document.getElementById('condicionVenta');
            const seccionCobro = document.getElementById('seccionCobro');
            condicion.onchange = () => {
                seccionCobro.style.display = (condicion.value === "Credito") ? "none" : "block";
            };

            // 3. Máscara de miles
            const inputMonto = document.getElementById('montoVenta');
            inputMonto.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, "");
                e.target.value = val ? new Intl.NumberFormat('de-DE').format(val) : "";
            });

            // 4. Buscador de RUC
            document.getElementById('clienteRuc').addEventListener('blur', async function() {
                const ruc = this.value.trim();
                if (ruc.length > 5) {
                    try {
                        const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "buscarRUC", ruc: ruc }) });
                        const data = await res.json();
                        if (data.nombre) document.getElementById('clienteNombre').value = data.nombre;
                    } catch (e) { console.log("Error RUC"); }
                }
            });

            // 5. IA Gemini
            const fileInput = document.getElementById('fileInput');
            fileInput.onchange = function() {
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    document.getElementById('fileName').textContent = "⌛ IA analizando factura...";
                    reader.onload = async function(e) {
                        try {
                            const res = await fetch(API_URL, {
                                method: 'POST',
                                body: JSON.stringify({ action: "leerFactura", image: e.target.result })
                            });
                            const result = await res.json();
                            if(result.success) {
                                if(result.ruc) document.getElementById('clienteRuc').value = result.ruc;
                                if(result.monto) document.getElementById('montoVenta').value = new Intl.NumberFormat('de-DE').format(result.monto);
                                if(result.nro) document.getElementById('nroComprobante').value = result.nro;
                                document.getElementById('fileName').textContent = "✅ Lectura exitosa";
                                document.getElementById('clienteRuc').dispatchEvent(new Event('blur'));
                            }
                        } catch (err) { 
                            document.getElementById('fileName').textContent = "❌ Error en conexión"; 
                        }
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            };

            // 6. Enviar a Google Sheets
            document.getElementById('formVenta').onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('submitVenta');
                btn.disabled = true;
                btn.textContent = "Procesando...";

                const montoFinal = inputMonto.value.replace(/\./g, "");
                const payload = {
                    sheetName: "VENTAS",
                    rowData: [
                        "VNT-" + Date.now(), new Date().toLocaleDateString(),
                        document.getElementById('nroComprobante').value,
                        document.getElementById('clienteNombre').value,
                        document.getElementById('clienteRuc').value,
                        Math.round(montoFinal/1.1), Math.round(montoFinal/11), montoFinal,
                        "₲", (condicion.value === "Contado" ? document.getElementById('medioPago').value : "CRÉDITO"),
                        (condicion.value === "Contado" ? "Cobrado" : "Pendiente"), ""
                    ]
                };

                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
                    if (condicion.value === "Contado") {
                        const mov = {
                            sheetName: "MOVIMIENTOS",
                            rowData: [
                                "MOV-" + Date.now(), payload.rowData[0], new Date().toLocaleString(),
                                "Admin", document.getElementById('cajaDestino').value, "Venta", "Ingreso",
                                montoFinal, "₲", 1, "Completado", "Fact " + payload.rowData[2]
                            ]
                        };
                        await fetch(API_URL, { method: 'POST', mode: '
