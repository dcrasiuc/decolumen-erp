<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decolumen ERP - Minimal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fafafa; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        /* Custom Scrollbar minimalista */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #d4d4d8; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ⚠️ IMPORTANTE: PEGA AQUÍ TU NUEVA URL DE GOOGLE SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbz7HMGvoWQcsjh9jdFjZKMtGFJwZLik-yq8bazGjtqtQlqZoPR97V_WDraTjatDUQj1/exec";
        
        let currentView = 'dashboard';
        let userRole = 'admin'; 
        let currentTipoDocVenta = 'Factura'; 
        
        // Datos simulados (Modo Local)
        let cuentas = [
            { id: "local1", nombre: "Caja Mostrador", categoria: "CAJA" },
            { id: "local2", nombre: "Banco Sudameris Gs.", categoria: "BANCO" },
            { id: "local3", nombre: "POS Bancard", categoria: "DIGITAL", comision: 3.5, diasAcreditacion: 2, bancoDestino: "Banco Sudameris Gs." },
            { id: "local4", nombre: "Cartera de Cheques", categoria: "CHEQUES" }
        ];
        let pendientesCobro = [];
        let pendientesPago = [];

        let db, auth;
        let isCloudActive = false;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'decolumen-erp';

        try {
            if (typeof __firebase_config !== 'undefined') {
                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                isCloudActive = true;
            }
        } catch (error) { console.warn("Ejecutando en Modo Local Seguro"); }

        const formatGs = (num) => new Intl.NumberFormat('de-DE').format(Math.round(num));
        const parseGs = (str) => parseInt(str.toString().replace(/\D/g, "")) || 0;
        const formatInput = (e) => { let val = e.target.value.replace(/\D/g, ""); e.target.value = val ? formatGs(val) : ""; };

        // Íconos SVG Minimalistas
        const icons = {
            dashboard: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>`,
            tesoreria: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><rect width="20" height="14" x="2" y="6" rx="2"/><path d="M2 10h20"/><path d="M6 14h.01"/><path d="M10 14h.01"/></svg>`,
            ventas: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"/><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"/><path d="M12 17V7"/></svg>`,
            config: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>`,
            compra: `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>`,
            scan: `<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`
        };

        // UI Helpers
        window.showToast = (msg, type = 'success') => {
            const container = document.getElementById('toast-container');
            if(!container) return;
            const toast = document.createElement('div');
            toast.className = `px-4 py-3 rounded-lg text-sm font-medium text-white shadow-lg fade-in flex items-center gap-2 transition-opacity duration-300 ${type === 'success' ? 'bg-zinc-900' : 'bg-red-600'}`;
            toast.innerHTML = msg;
            container.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
        };

        async function initApp() {
            if (isCloudActive) {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                    else await signInAnonymously(auth);
                    onAuthStateChanged(auth, (u) => {
                        if (u) {
                            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'config_cuentas'), (snapshot) => {
                                cuentas = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                                renderizarApp();
                            }, () => renderizarApp());
                        }
                    });
                } catch (error) { renderizarApp(); }
            } else renderizarApp();
        }

        window.actualizarDatosTesoreria = () => {
            pendientesCobro = [{ id: "V001", fecha: "Hoy", nro: "002-002-0000010", nombre: "Cliente Ejemplo S.A.", ruc: "80012345-6", monto: 1500000 }];
            pendientesPago = [{ id: "C001", fecha: "Vence Hoy", nro: "001-001-0099887", nombre: "Tracsa", ruc: "800999-0", monto: 1200000 }];
            renderizarApp();
        };

        window.renderizarApp = () => {
            const root = document.getElementById('root');
            if (!root) return;
            
            root.innerHTML = `
                <div class="flex h-screen bg-zinc-50 overflow-hidden text-zinc-900">
                    <!-- SIDEBAR -->
                    <aside class="w-64 bg-zinc-950 text-zinc-300 flex flex-col border-r border-zinc-800 z-20">
                        <div class="p-8 border-b border-zinc-800/50">
                            <div class="text-xl font-bold tracking-tight text-white flex items-center gap-2">
                                <div class="w-2 h-2 rounded-full bg-[#F6B221]"></div>
                                DECOLUMEN
                            </div>
                            <div class="text-[10px] text-zinc-500 mt-1 uppercase tracking-widest font-medium">Tenamia SRL</div>
                        </div>

                        <nav class="flex-grow py-6 px-4 space-y-1">
                            ${navItem('dashboard', icons.dashboard, 'Dashboard')}
                            ${userRole === 'admin' ? navItem('tesoreria', icons.tesoreria, 'Tesorería') : ''}
                            ${userRole === 'admin' ? navItem('admin_cuentas', icons.config, 'Configuración') : ''}
                        </nav>

                        <div class="p-4 mx-4 mb-6 rounded-xl bg-zinc-900/50 border border-zinc-800">
                            <p class="text-[10px] uppercase tracking-widest text-zinc-500 mb-2 text-center font-medium">Perfil Activo</p>
                            <div class="flex gap-1 bg-zinc-950 p-1 rounded-lg border border-zinc-800">
                                <button onclick="window.setRole('admin')" class="flex-1 py-1.5 text-[10px] font-semibold rounded-md transition-all ${userRole === 'admin' ? 'bg-zinc-800 text-white' : 'text-zinc-500 hover:text-zinc-300'}">ADMIN</button>
                                <button onclick="window.setRole('vendedor')" class="flex-1 py-1.5 text-[10px] font-semibold rounded-md transition-all ${userRole === 'vendedor' ? 'bg-zinc-800 text-white' : 'text-zinc-500 hover:text-zinc-300'}">VENTAS</button>
                            </div>
                        </div>
                    </aside>

                    <!-- MAIN CONTENT -->
                    <main class="flex-grow flex flex-col overflow-hidden relative">
                        <header class="h-20 bg-white border-b border-zinc-200 flex items-center justify-between px-10 z-10">
                            <h1 class="font-semibold text-zinc-800 text-lg tracking-tight">${tituloVista()}</h1>
                            <div class="flex items-center gap-4">
                                <span class="text-xs font-medium text-zinc-500">${userRole === 'admin' ? 'Administrador' : 'Vendedor'}</span>
                                <div class="w-8 h-8 rounded-full bg-zinc-100 border border-zinc-200 flex items-center justify-center text-zinc-600">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                </div>
                            </div>
                        </header>
                        
                        <div class="p-10 overflow-y-auto flex-grow">
                            <div class="max-w-6xl mx-auto fade-in">
                                ${renderView()}
                            </div>
                        </div>
                    </main>
                </div>
                ${renderModals()}
                <!-- Contenedor para Notificaciones Emergentes -->
                <div id="toast-container" class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-2"></div>
            `;
            vincularEventos();
        };

        function navItem(view, icon, label) {
            const active = currentView === view;
            return `<button onclick="window.setView('${view}')" class="w-full flex items-center gap-3 px-4 py-2.5 rounded-lg transition-all ${active ? 'bg-zinc-800 text-white' : 'text-zinc-400 hover:bg-zinc-900 hover:text-zinc-200'}">
                <span class="${active ? 'text-[#F6B221]' : ''}">${icon}</span>
                <span class="text-sm font-medium">${label}</span>
            </button>`;
        }

        function tituloVista() {
            const titulos = { 'dashboard': 'Visión General', 'tesoreria': 'Control de Tesorería', 'admin_cuentas': 'Ajustes del Sistema' };
            return titulos[currentView] || '';
        }

        function renderView() {
            if (currentView === 'dashboard') {
                return `
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${actionCard('modalVenta', icons.ventas, 'Registrar Venta', 'Factura o Remito de cliente')}
                        ${userRole === 'admin' ? `
                            <div onclick="window.setView('tesoreria')" class="bg-white p-8 rounded-2xl border border-zinc-200 hover:border-zinc-300 transition-colors cursor-pointer flex flex-col items-start shadow-sm group">
                                <div class="w-10 h-10 rounded-lg bg-zinc-100 text-zinc-700 flex items-center justify-center mb-6 group-hover:bg-zinc-900 group-hover:text-white transition-colors">${icons.tesoreria}</div>
                                <h3 class="font-semibold text-zinc-900 text-lg mb-1">Tesorería</h3>
                                <p class="text-xs text-zinc-500">Conciliar cobros y pagos</p>
                            </div>
                        ` : ''}
                        ${userRole === 'admin' ? actionCard('modalCompra', icons.compra, 'Registrar Gasto', 'Facturas de proveedores') : ''}
                    </div>
                `;
            }

            if (currentView === 'tesoreria') {
                return `
                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                        <div class="bg-white rounded-2xl border border-zinc-200 flex flex-col h-[70vh] shadow-sm">
                            <div class="p-6 border-b border-zinc-100 flex justify-between items-center">
                                <div>
                                    <h2 class="font-semibold text-zinc-900">Cobros Pendientes</h2>
                                    <p class="text-xs text-zinc-500 mt-1">Cuentas por cobrar</p>
                                </div>
                                <span class="bg-zinc-100 text-zinc-700 px-2.5 py-1 rounded text-[10px] font-medium tracking-wide">INGRESOS</span>
                            </div>
                            <div class="p-2 overflow-y-auto flex-grow">
                                ${pendientesCobro.map(p => `
                                    <div class="p-4 mx-2 my-2 rounded-xl border border-zinc-100 flex justify-between items-center group hover:border-zinc-300 transition-all">
                                        <div><p class="text-[10px] text-zinc-400 font-mono mb-1">${p.nro}</p><p class="font-medium text-sm text-zinc-900">${p.nombre}</p><p class="text-xs text-zinc-500 mt-0.5">${p.fecha}</p></div>
                                        <div class="text-right"><p class="font-semibold text-zinc-900">${formatGs(p.monto)} ₲</p></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>

                        <div class="bg-white rounded-2xl border border-zinc-200 flex flex-col h-[70vh] shadow-sm">
                            <div class="p-6 border-b border-zinc-100 flex justify-between items-center">
                                <div>
                                    <h2 class="font-semibold text-zinc-900">Pagos Pendientes</h2>
                                    <p class="text-xs text-zinc-500 mt-1">Obligaciones</p>
                                </div>
                                <span class="bg-zinc-100 text-zinc-700 px-2.5 py-1 rounded text-[10px] font-medium tracking-wide">EGRESOS</span>
                            </div>
                            <div class="p-2 overflow-y-auto flex-grow">
                                ${pendientesPago.map(p => `
                                    <div class="p-4 mx-2 my-2 rounded-xl border border-zinc-100 flex justify-between items-center group hover:border-zinc-300 transition-all">
                                        <div><p class="text-[10px] text-zinc-400 font-mono mb-1">${p.nro}</p><p class="font-medium text-sm text-zinc-900">${p.nombre}</p><p class="text-xs text-zinc-500 mt-0.5">Vto: ${p.fecha}</p></div>
                                        <div class="text-right"><p class="font-semibold text-zinc-900">${formatGs(p.monto)} ₲</p></div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }
            if (currentView === 'admin_cuentas') {
                 return `
                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="bg-white p-6 rounded-2xl border border-zinc-200 h-fit shadow-sm">
                            <h3 class="font-semibold text-zinc-900 mb-6 flex items-center gap-2">${icons.plus} Nueva Subcuenta</h3>
                            <form id="formNuevaCuenta" class="space-y-4">
                                <div><label class="block text-xs font-medium text-zinc-600 mb-1.5">Nombre de la cuenta</label><input name="nombre" required class="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 outline-none transition-all"></div>
                                <div><label class="block text-xs font-medium text-zinc-600 mb-1.5">Tipo</label><select name="categoria" id="adminCat" class="w-full p-2.5 border border-zinc-200 rounded-lg text-sm focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 outline-none"><option value="CAJA">Efectivo</option><option value="BANCO">Banco</option><option value="DIGITAL">POS/Digital</option><option value="CHEQUES">Cheques</option></select></div>
                                <button type="submit" class="w-full bg-zinc-900 text-white py-2.5 rounded-lg text-sm font-medium hover:bg-zinc-800 transition-colors mt-2">Guardar Cuenta</button>
                            </form>
                        </div>
                        <div class="lg:col-span-2 bg-white rounded-2xl border border-zinc-200 overflow-hidden shadow-sm">
                            <table class="w-full text-left">
                                <thead class="bg-zinc-50 border-b border-zinc-100">
                                    <tr><th class="p-4 text-xs font-medium text-zinc-500">Cuenta</th><th class="p-4 text-xs font-medium text-zinc-500">Categoría</th><th class="p-4"></th></tr>
                                </thead>
                                <tbody class="divide-y divide-zinc-100 text-sm">
                                    ${cuentas.map(c => `<tr><td class="p-4 font-medium text-zinc-900">${c.nombre}</td><td class="p-4 text-xs text-zinc-500">${c.categoria}</td><td class="p-4 text-right"><button class="text-zinc-400 hover:text-red-500 transition-colors" onclick="window.showToast('Funcionalidad de borrado en desarrollo', 'error')"><svg class="w-4 h-4 inline" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button></td></tr>`).join('')}
                                </tbody>
                            </table>
                        </div>
                    </div>
                `;
            }
            return '';
        }

        function actionCard(modalId, icon, title, desc) {
            return `
                <div onclick="window.showModal('${modalId}')" class="bg-white p-8 rounded-2xl border border-zinc-200 hover:border-zinc-300 transition-colors cursor-pointer flex flex-col items-start shadow-sm group">
                    <div class="w-10 h-10 rounded-lg bg-zinc-100 text-zinc-700 flex items-center justify-center mb-6 group-hover:bg-zinc-900 group-hover:text-white transition-colors">${icon}</div>
                    <h3 class="font-semibold text-zinc-900 text-lg mb-1">${title}</h3>
                    <p class="text-xs text-zinc-500">${desc}</p>
                </div>
            `;
        }

        const inputClass = "w-full p-3 border border-zinc-200 rounded-lg text-sm focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 outline-none transition-shadow";
        const labelClass = "block text-xs font-medium text-zinc-600 mb-1.5";

        function renderModals() {
            return `
                <!-- MODAL VENTA -->
                <div id="modalVenta" class="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4 overflow-y-auto">
                    <div class="bg-white rounded-2xl w-full max-w-xl shadow-xl overflow-hidden fade-in my-auto">
                        <div class="px-6 py-4 border-b border-zinc-100 flex justify-between items-center bg-white sticky top-0 z-10">
                            <h3 id="txtModalVenta" class="font-semibold text-zinc-900">Nueva Factura de Venta</h3>
                            <div class="flex items-center gap-4">
                                <button type="button" onclick="window.toggleTipoDocVenta()" id="btnToggleTipoVenta" class="text-xs text-zinc-500 hover:text-zinc-900 font-medium transition-colors">Cambiar a Remito</button>
                                <button onclick="window.hideModal('modalVenta')" class="text-zinc-400 hover:text-zinc-600 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                            </div>
                        </div>
                        
                        <form id="formVenta" class="p-6 space-y-5">
                            <div>
                                <button type="button" onclick="document.getElementById('v_file').click()" class="w-full py-3 border border-dashed border-zinc-300 rounded-xl text-xs font-medium text-zinc-500 hover:text-zinc-800 hover:bg-zinc-50 hover:border-zinc-400 transition-all flex items-center justify-center gap-2">
                                    ${icons.scan} Autocompletar con IA (OCR)
                                </button>
                                <input type="file" id="v_file" accept="image/*" capture="environment" class="hidden">
                                <div id="v_status" class="text-center text-[10px] font-medium text-zinc-500 h-2 mt-1"></div>
                            </div>

                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="${labelClass}">Condición</label><select id="v_cond" class="${inputClass}"><option value="Contado">Contado</option><option value="Credito">Crédito</option></select></div>
                                <div><label id="lblNroVenta" class="${labelClass}">Nro. Documento</label><input type="text" id="v_nro" class="${inputClass} font-mono" placeholder="002-002-"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="${labelClass}">RUC / CI</label><input type="text" id="v_ruc" class="${inputClass}"></div>
                                <div><label class="${labelClass}">Cliente</label><input type="text" id="v_nom" class="${inputClass}"></div>
                            </div>
                            <div>
                                <label class="${labelClass}">Monto Total (Gs.)</label>
                                <input type="text" id="v_monto" class="w-full p-4 border border-zinc-200 rounded-xl text-2xl font-semibold text-zinc-900 text-right focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 outline-none" placeholder="0">
                            </div>

                            <!-- PANEL DE COBROS Y MEDIOS DE PAGO -->
                            <div id="v_panelCobro" class="${userRole === 'admin' ? 'block' : 'hidden'} p-5 bg-zinc-50 rounded-xl border border-zinc-200">
                                <p class="text-xs font-medium text-zinc-600 mb-3 border-b border-zinc-200 pb-2">Asignación de Cobro</p>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Medio</label><select id="v_cat" class="${inputClass} py-2"><option value="CAJA">Efectivo</option><option value="DIGITAL">POS / Tarjeta</option><option value="BANCO">Transferencia</option><option value="CHEQUES">Cheques</option></select></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Destino</label><select id="v_sub" class="${inputClass} py-2"></select></div>
                                </div>

                                <!-- PANEL POS -->
                                <div id="v_panelPOS" class="hidden mt-4 grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Nro. Comprobante POS</label><input type="text" id="v_pos_comp" class="${inputClass} py-2"></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Nro. Lote</label><input type="text" id="v_pos_lote" class="${inputClass} py-2"></div>
                                    <div class="col-span-2 text-[10px] text-zinc-500 font-medium bg-white p-2 rounded border border-zinc-200" id="v_pos_resumen"></div>
                                </div>

                                <!-- PANEL CHEQUE -->
                                <div id="v_panelCheque" class="hidden mt-4 grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Nro. Cheque</label><input type="text" id="v_chq_nro" class="${inputClass} py-2"></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Banco Emisor</label><input type="text" id="v_chq_banco" class="${inputClass} py-2"></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Fecha Emisión</label><input type="date" id="v_chq_femision" class="${inputClass} py-2 text-xs text-zinc-500"></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Fecha a Cobrar</label><input type="date" id="v_chq_fcobro" class="${inputClass} py-2 text-xs text-zinc-500"></div>
                                </div>
                            </div>

                            <div class="pt-4">
                                <button type="submit" class="w-full bg-zinc-900 text-white py-3 rounded-xl text-sm font-medium hover:bg-zinc-800 transition-colors">
                                    ${userRole === 'admin' ? 'Guardar y Liquidar' : 'Registrar Venta'}
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- MODAL COMPRA -->
                <div id="modalCompra" class="fixed inset-0 bg-zinc-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4 overflow-y-auto">
                    <div class="bg-white rounded-2xl w-full max-w-xl shadow-xl overflow-hidden fade-in my-auto">
                        <div class="px-6 py-4 border-b border-zinc-100 flex justify-between items-center bg-white sticky top-0 z-10">
                            <h3 class="font-semibold text-zinc-900">Registro de Gasto / Compra</h3>
                            <button onclick="window.hideModal('modalCompra')" class="text-zinc-400 hover:text-zinc-600 p-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                        </div>
                        
                        <form id="formCompra" class="p-6 space-y-5">
                            <div>
                                <button type="button" onclick="document.getElementById('c_file').click()" class="w-full py-3 border border-dashed border-zinc-300 rounded-xl text-xs font-medium text-zinc-500 hover:text-zinc-800 hover:bg-zinc-50 hover:border-zinc-400 transition-all flex items-center justify-center gap-2">
                                    ${icons.scan} Escanear factura de proveedor
                                </button>
                                <input type="file" id="c_file" accept="image/*" capture="environment" class="hidden">
                                <div id="c_status" class="text-center text-[10px] font-medium text-zinc-500 h-2 mt-1"></div>
                            </div>
                            
                            <div><label class="${labelClass}">Concepto / Descripción del Gasto</label><input type="text" id="c_concepto" required class="${inputClass}" placeholder="Ej: Pago a Tracsa, Luz..."></div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="${labelClass}">Condición</label><select id="c_cond" class="${inputClass}"><option value="Contado">Contado</option><option value="Credito">Crédito</option></select></div>
                                <div><label class="${labelClass}">Nro. Factura</label><input type="text" id="c_nro" class="${inputClass} font-mono" placeholder="001-001-"></div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div><label class="${labelClass}">RUC Proveedor</label><input type="text" id="c_ruc" class="${inputClass}"></div>
                                <div><label class="${labelClass}">Razón Social</label><input type="text" id="c_nom" class="${inputClass}" placeholder="Ej: Tracsa"></div>
                            </div>
                            <div>
                                <label class="${labelClass}">Monto a Pagar (Gs.)</label>
                                <input type="text" id="c_monto" class="w-full p-4 border border-zinc-200 rounded-xl text-2xl font-semibold text-zinc-900 text-right focus:border-zinc-900 focus:ring-1 focus:ring-zinc-900 outline-none" placeholder="0">
                            </div>

                            <div id="c_panelPago" class="${userRole === 'admin' ? 'block' : 'hidden'} p-4 bg-zinc-50 rounded-xl border border-zinc-200">
                                <p class="text-xs font-medium text-zinc-600 mb-3 border-b border-zinc-200 pb-2">Origen de los Fondos</p>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Vía</label><select id="c_cat" class="${inputClass} py-2"><option value="CAJA">Efectivo</option><option value="BANCO">Transferencia</option><option value="CHEQUES">Cheques</option></select></div>
                                    <div><label class="text-[10px] text-zinc-500 block mb-1 uppercase tracking-wider">Subcuenta</label><select id="c_sub" class="${inputClass} py-2"></select></div>
                                </div>
                            </div>
                            <div class="pt-4">
                                <button type="submit" class="w-full bg-zinc-900 text-white py-3 rounded-xl text-sm font-medium hover:bg-zinc-800 transition-colors">Registrar Gasto</button>
                            </div>
                        </form>
                    </div>
                </div>
            `;
        }

        // Lógica de IA (OCR)
        function OCR_Process(inputId, statusId, nroId, rucId, montoId) {
            const file = document.getElementById(inputId).files[0]; if (!file) return;
            const st = document.getElementById(statusId); st.innerHTML = "Analizando documento con inteligencia artificial...";
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = async () => {
                    const canvas = document.createElement('canvas'); let w = img.width; if (w > 1000) { img.height *= 1000/w; w = 1000; }
                    canvas.width = w; canvas.height = img.height; canvas.getContext('2d').drawImage(img, 0, 0, w, img.height);
                    try {
                        const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: "leerFactura", image: canvas.toDataURL('image/jpeg', 0.6) }) });
                        const res = await r.json();
                        if (res.success) {
                            document.getElementById(nroId).value = res.nro || ""; document.getElementById(rucId).value = res.ruc || ""; document.getElementById(montoId).value = res.monto ? formatGs(res.monto) : "";
                            st.innerHTML = "Extracción exitosa."; document.getElementById(nroId).dispatchEvent(new Event('blur'));
                        } else st.innerHTML = "No se detectaron datos legibles";
                    } catch (err) { st.innerHTML = "Error al contactar con la IA"; }
                };
            }; reader.readAsDataURL(file);
        }

        window.vincularEventos = () => {
            const fVenta = document.getElementById('formVenta');
            if (fVenta) {
                const iNro = document.getElementById('v_nro'), iMonto = document.getElementById('v_monto'), iRuc = document.getElementById('v_ruc'), sCat = document.getElementById('v_cat'), sSub = document.getElementById('v_sub'), cond = document.getElementById('v_cond');
                const pPOS = document.getElementById('v_panelPOS'), pChq = document.getElementById('v_panelCheque');
                
                iMonto.oninput = formatInput;
                iNro.onblur = () => { if (iNro.value && currentTipoDocVenta === 'Factura') { let num = iNro.value.replace(/\D/g, ""); if (num) iNro.value = `002-002-${num.slice(-7).padStart(7, '0')}`; } };

                const upSubVenta = () => { 
                    if(!sCat || !sSub) return; 
                    const f = cuentas.filter(c => c.categoria === sCat.value); 
                    sSub.innerHTML = f.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join(''); 
                    
                    if (sCat.value === 'DIGITAL') {
                        pPOS.classList.remove('hidden'); pChq.classList.add('hidden');
                        const act = f.find(c => c.nombre === sSub.value);
                        if(act && act.comision) {
                            const mt = parseGs(iMonto.value); const com = Math.round(mt * (act.comision / 100));
                            document.getElementById('v_pos_resumen').innerText = `Comisión Bancard estimada: ${formatGs(com)} ₲ (${act.comision}%). Acreditación en ${act.diasAcreditacion || 0} días.`;
                        } else { document.getElementById('v_pos_resumen').innerText = ""; }
                    } else if (sCat.value === 'CHEQUES') {
                        pChq.classList.remove('hidden'); pPOS.classList.add('hidden');
                    } else {
                        pPOS.classList.add('hidden'); pChq.classList.add('hidden');
                    }
                };
                
                if(sCat) sCat.onchange = upSubVenta; upSubVenta();
                iMonto.addEventListener('input', upSubVenta);
                if(cond) cond.onchange = () => { document.getElementById('v_panelCobro').classList.toggle('hidden', cond.value === 'Credito' || userRole === 'vendedor'); };

                fVenta.onsubmit = async (e) => {
                    e.preventDefault();
                    const btn = document.querySelector('#formVenta button[type="submit"]'); btn.disabled = true; btn.textContent = "Procesando...";
                    const mT = parseGs(iMonto.value); const idVenta = "VNT-" + Date.now();
                    
                    const payloadVenta = { action: "guardarVenta", idVenta, fecha: new Date().toLocaleDateString(), cliente: document.getElementById('v_nom').value, ruc: iRuc.value, nroFactura: iNro.value, montoTotal: mT, montoIva: Math.round(mT/11), estadoCobro: (userRole === 'vendedor' || cond.value === 'Credito') ? "Pendiente" : "Cobrado", idVinculo: currentTipoDocVenta };

                    try {
                        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadVenta) });
                        if (userRole === 'admin' && cond.value === 'Contado') {
                            const payloadMov = { action: "guardarMovimiento", idMov: "MOV-"+Date.now(), idVinculo: idVenta, fecha: new Date().toLocaleString(), usuario: "Admin", cuenta: sSub.value, tipoOperacion: "Venta", sentido: "Ingreso", monto: mT, estado: sCat.value === 'CHEQUES' ? "En Cartera" : "Completado", observaciones: "Cobro "+currentTipoDocVenta+" "+iNro.value };
                            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadMov) });

                            if (sCat.value === 'DIGITAL') {
                                const cAct = cuentas.find(c => c.nombre === sSub.value); const com = cAct && cAct.comision ? Math.round(mT * (cAct.comision / 100)) : 0;
                                let fAcred = new Date(); if(cAct && cAct.diasAcreditacion) fAcred.setDate(fAcred.getDate() + cAct.diasAcreditacion);
                                const payloadPOS = { action: "guardarCobroPOS", idPOS: "POS-"+Date.now(), idVinculo: idVenta, fechaOperacion: new Date().toLocaleString(), terminal: sSub.value, nroComprobante: document.getElementById('v_pos_comp').value, montoBruto: mT, comisionRetenida: com, montoNeto: mT - com, nroLote: document.getElementById('v_pos_lote').value, estadoAcreditacion: "Pendiente", fechaAcreditacion: fAcred.toLocaleDateString() };
                                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadPOS) });
                            }

                            if (sCat.value === 'CHEQUES') {
                                const payloadCheque = { action: "guardarCheque", idCheque: "CHQ-"+Date.now(), idVinculo: idVenta, nroCheque: document.getElementById('v_chq_nro').value, bancoEmisor: document.getElementById('v_chq_banco').value, emisor: document.getElementById('v_nom').value, fechaEmision: document.getElementById('v_chq_femision').value, fechaCobro: document.getElementById('v_chq_fcobro').value, monto: mT, estado: "En Cartera" };
                                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadCheque) });
                            }
                        }
                        window.showToast(userRole === 'admin' && cond.value === 'Contado' ? "Operación guardada y cobrada exitosamente." : "Operación enviada a bandeja de pendientes.");
                        window.hideModal('modalVenta'); fVenta.reset(); document.getElementById('v_status').innerHTML = "";
                    } catch (err) { window.showToast("Error de conexión al servidor.", "error"); } finally { btn.disabled = false; btn.textContent = userRole === 'admin' ? "Guardar y Liquidar" : "Registrar Venta"; }
                };
            }

            const fCompra = document.getElementById('formCompra');
            if (fCompra) {
                const cMonto = document.getElementById('c_monto'), cNro = document.getElementById('c_nro'), cRuc = document.getElementById('c_ruc'), cCat = document.getElementById('c_cat'), cSub = document.getElementById('c_sub'), cCond = document.getElementById('c_cond'), cConcepto = document.getElementById('c_concepto');
                cMonto.oninput = formatInput;
                
                const upSubCompra = () => { if(!cCat || !cSub) return; const f = cuentas.filter(c => c.categoria === cCat.value); cSub.innerHTML = f.map(c => `<option value="${c.nombre}">${c.nombre}</option>`).join(''); };
                if(cCat) cCat.onchange = upSubCompra; upSubCompra();
                if(cCond) cCond.onchange = () => { document.getElementById('c_panelPago').classList.toggle('hidden', cCond.value === 'Credito'); };

                fCompra.onsubmit = async (e) => {
                    e.preventDefault();
                    const btn = document.querySelector('#formCompra button[type="submit"]'); btn.disabled = true; btn.textContent = "Registrando...";
                    const mT = parseGs(cMonto.value); const idCompra = "CMP-" + Date.now();
                    
                    const payloadCompra = { action: "guardarCompra", idCompra, fecha: new Date().toLocaleDateString(), proveedor: document.getElementById('c_nom').value, ruc: cRuc.value, nroComprobante: cNro.value, concepto: cConcepto.value, montoTotal: mT, montoIva: Math.round(mT/11), estadoPago: cCond.value === 'Credito' ? "Pendiente" : "Pagado", autorizadoPor: userRole.toUpperCase(), idVinculo: "" };

                    try {
                        await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadCompra) });
                        if (userRole === 'admin' && cCond.value === 'Contado') {
                            const payloadMov = { action: "guardarMovimiento", idMov: "GAS-"+Date.now(), idVinculo: idCompra, fecha: new Date().toLocaleString(), usuario: "Admin", cuenta: cSub.value, tipoOperacion: "Compra", sentido: "Egreso", monto: mT, estado: "Completado", observaciones: "Pago " + cConcepto.value };
                            await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payloadMov) });
                        }
                        window.showToast("Gasto registrado por: " + cConcepto.value); 
                        window.hideModal('modalCompra'); fCompra.reset(); document.getElementById('c_status').innerHTML = "";
                    } catch (err) { window.showToast("Error al conectar con la base de datos.", "error"); } finally { btn.disabled = false; btn.textContent = "Registrar Gasto"; }
                };
            }
        };

        window.setView = (v) => { currentView = v; renderizarApp(); if(v === 'tesoreria') window.actualizarDatosTesoreria(); };
        window.setRole = (r) => { userRole = r; renderizarApp(); };
        window.showModal = (id) => { const m = document.getElementById(id); if(m) m.style.display = 'flex'; };
        window.hideModal = (id) => { const m = document.getElementById(id); if(m) m.style.display = 'none'; };
        window.toggleTipoDocVenta = () => {
            const t = document.getElementById('txtModalVenta'), b = document.getElementById('btnToggleTipoVenta'), l = document.getElementById('lblNroVenta'), i = document.getElementById('v_nro');
            if (currentTipoDocVenta === 'Factura') { currentTipoDocVenta = 'Remito'; t.innerText = "Remito de Entrega"; b.innerText = "Cambiar a Factura"; l.innerText = "Nro. de Remito"; i.value = ""; } 
            else { currentTipoDocVenta = 'Factura'; t.innerText = "Nueva Factura de Venta"; b.innerText = "Cambiar a Remito"; l.innerText = "Nro. Documento"; i.value = "002-002-"; }
        };

        initApp();
    </script>
</head>
<body id="root" class="bg-zinc-100"></body>
</html>
