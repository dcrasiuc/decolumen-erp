<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decolumen ERP - Panel de Control</title>
    <style>
        /* ESTILOS DECOLUMEN */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { display: flex; height: 100vh; background-color: #f4f7f6; overflow: hidden; }
        
        .sidebar { width: 250px; background-color: #176894; color: white; display: flex; flex-direction: column; flex-shrink: 0; }
        .logo-area { padding: 25px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-area h2 { font-size: 24px; letter-spacing: 1px; }
        .logo-area span { color: #F6B221; }
        
        .nav-menu { flex-grow: 1; padding: 20px 0; }
        .nav-item { padding: 15px 25px; display: block; color: white; text-decoration: none; font-size: 15px; transition: 0.2s; border-left: 4px solid transparent; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background-color: rgba(255,255,255,0.1); border-left-color: #F6B221; }
        
        .logout-btn { padding: 15px 25px; background-color: #125275; color: white; text-align: center; cursor: pointer; font-weight: bold; border-top: 1px solid rgba(255,255,255,0.1); }
        .logout-btn:hover { background-color: #d9534f; }

        .main-content { flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-header { background-color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-title { color: #333; font-size: 18px; font-weight: bold; }

        .workspace { padding: 30px; }
        .section-title { margin-bottom: 20px; color: #444; font-size: 18px; font-weight: bold; }
        .action-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; }
        
        .action-card { background: white; border-radius: 10px; padding: 25px; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); cursor: pointer; transition: 0.2s; border: 1px solid #eaeaea; }
        .action-card:hover { transform: translateY(-3px); border-color: #F6B221; }
        .action-icon { font-size: 35px; margin-bottom: 10px; display: block; }

        /* MODALES */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 9999; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 600px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .close-modal { font-size: 28px; cursor: pointer; color: #999; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; }
        .form-row { display: flex; gap: 15px; }
        .form-row .form-group { flex: 1; }
        
        .btn-submit { width: 100%; padding: 12px; background-color: #F6B221; color: #333; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-scan { width: 100%; padding: 10px; border: 1px dashed #176894; background: #e8f4fd; color: #176894; cursor: pointer; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo-area"><h2>DECO<span>LUMEN</span></h2></div>
        <div class="nav-menu">
            <div class="nav-item active">📊 Inicio / Dashboard</div>
            <div class="nav-item">🛒 Ventas y Cobros</div>
            <div class="nav-item">📦 Compras y Gastos</div>
        </div>
        <div class="logout-btn" onclick="window.location.href='index.html'">Cerrar Sesión</div>
    </div>

    <div class="main-content">
        <div class="top-header">
            <div class="header-title">Panel Decolumen</div>
            <div class="user-info">👤 Administrador</div>
        </div>

        <div class="workspace">
            <div class="section-title">Acciones Rápidas</div>
            <div class="action-grid">
                <div class="action-card" id="btnVenta">
                    <span class="action-icon">💵</span>
                    <h3>Nueva Venta</h3>
                </div>
                <div class="action-card" id="btnTransferencia">
                    <span class="action-icon">🔄</span>
                    <h3>Transferencia</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="modalVenta" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>🛒 Registrar Venta</h3>
                <span class="close-modal" id="closeVentaModal">&times;</span>
            </div>
            <form id="formVenta">
                <div class="form-row">
                    <div class="form-group">
                        <label>Condición</label>
                        <select id="condicionVenta">
                            <option value="Contado">Contado</option>
                            <option value="Credito">Crédito</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>N° Factura</label>
                        <input type="text" id="nroComprobante" required placeholder="000-000-0000000">
                    </div>
                </div>
                <div class="form-group">
                    <label>Cliente / RUC</label>
                    <div class="form-row">
                        <input type="text" id="clienteNombre" required placeholder="Nombre" style="flex:2">
                        <input type="text" id="clienteRuc" required placeholder="RUC" style="flex:1">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Total Gs.</label>
                        <input type="text" id="montoVenta" required style="text-align: right; font-weight: bold;">
                    </div>
                    <div class="form-group">
                        <label>Medio de Pago</label>
                        <select id="medioPago">
                            <option value="Efectivo">Efectivo</option>
                            <option value="Tarjeta">Tarjeta</option>
                            <option value="Transferencia">Transferencia</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Escanear Factura</label>
                    <button type="button" class="btn-scan" onclick="document.getElementById('fileInput').click()">📷 Tomar Foto</button>
                    <input type="file" id="fileInput" accept="image/*" capture="environment" style="display:none">
                    <div id="fileName" style="font-size: 11px; color: #176894; margin-top: 5px; text-align: center;"></div>
                </div>

                <button type="submit" class="btn-submit" id="submitVenta">Registrar Operación</button>
            </form>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            const API_URL = "https://script.google.com/macros/s/AKfycbz7HMGvoWQcsjh9jdFjZKMtGFJwZLik-yq8bazGjtqtQlqZoPR97V_WDraTjatDUQj1/exec";
            let base64Image = "";

            // 1. Modales
            const modalVenta = document.getElementById('modalVenta');
            document.getElementById('btnVenta').onclick = () => modalVenta.classList.add('active');
            document.getElementById('closeVentaModal').onclick = () => modalVenta.classList.remove('active');

            // 2. Máscara de miles
            const inputMonto = document.getElementById('montoVenta');
            inputMonto.addEventListener('input', (e) => {
                let val = e.target.value.replace(/\D/g, "");
                if (val === "") { e.target.value = ""; return; }
                e.target.value = new Intl.NumberFormat('de-DE').format(val);
            });

            // 3. Cámara e IA (OCR)
            const fileInput = document.getElementById('fileInput');
            const fileNameDisplay = document.getElementById('fileName');

            fileInput.onchange = function() {
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    fileNameDisplay.textContent = "⌛ Leyendo factura (IA)...";
                    
                    reader.onload = async function(e) {
                        base64Image = e.target.result;
                        try {
                            const response = await fetch(API_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({ action: "leerFactura", image: base64Image })
                            });
                            const result = await response.json();
                            console.log("IA respondió:", result);

                            if(result.success) {
                                if(result.ruc) document.getElementById('clienteRuc').value = result.ruc;
                                if(result.monto) document.getElementById('montoVenta').value = new Intl.NumberFormat('de-DE').format(result.monto);
                                if(result.nro) document.getElementById('nroComprobante').value = result.nro;
                                fileNameDisplay.textContent = "✅ Datos cargados correctamente.";
                            } else {
                                fileNameDisplay.textContent = "⚠️ No se detectaron datos.";
                            }
                        } catch (err) {
                            console.error("Error:", err);
                            fileNameDisplay.textContent = "✅ Foto lista.";
                        }
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            };

            // 4. Envío de Datos
            const formVenta = document.getElementById('formVenta');
            formVenta.onsubmit = async (e) => {
                e.preventDefault();
                const submitBtn = document.getElementById('submitVenta');
                const total = inputMonto.value.replace(/\./g, "");
                
                submitBtn.disabled = true;
                submitBtn.textContent = "Guardando...";

                const rowData = [
                    "VNT-"+Date.now(), new Date().toLocaleDateString(), 
                    document.getElementById('nroComprobante').value, document.getElementById('clienteNombre').value, 
                    document.getElementById('clienteRuc').value, Math.round(total/1.1), Math.round(total/11), 
                    total, "₲", document.getElementById('medioPago').value, "Cobrado", base64Image
                ];

                try {
                    await fetch(API_URL, { 
                        method: 'POST', 
                        mode: 'no-cors', 
                        body: JSON.stringify({ sheetName: "VENTAS", rowData: rowData }) 
                    });
                    alert("¡Registrado!");
                    modalVenta.classList.remove('active');
                    formVenta.reset();
                    fileNameDisplay.textContent = "";
                } catch (err) {
                    alert("Error al guardar");
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.textContent = "Registrar Operación";
                }
            };
        });
    </script>
</body>
</html>
